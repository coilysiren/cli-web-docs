# Categorizes PRs into release-note sections based on labels.
# See https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  categories:
    - title: "🚨 Breaking changes"
      labels:
        - breaking
    - title: "✨ Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧰 Maintenance"
      labels:
        - chore
        - refactor
    - title: "📦 Dependencies"
      labels:
        - dependencies
    - title: "🛡️ Security"
      labels:
        - security
    - title: "🔍 Other changes"
      labels:
        - "*"
  exclude:
    labels:
      - duplicate
      - wontfix
      - invalid
      - question
