commands:
  build:
    run: make build
    description: Build all packages.
  test:
    run: make test
    description: Run the unit test suite.
  vet:
    run: make vet
    description: go vet across the tree.
  lint:
    run: make lint
    description: Lint with golangci-lint.
  tidy:
    run: make tidy
    description: go mod tidy.
  cover:
    run: make cover
    description: Unit tests with a coverage profile.
  docs:
    run: make docs
    description: Build the mkdocs site into ./site.
  docs-serve:
    run: make docs-serve
    description: Serve mkdocs locally with live reload on 127.0.0.1:8000.
  godoc-update:
    run: make godoc-update
    description: Regenerate godoc-current.txt; commit the diff to land API changes.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/coilyco-ai#420 (tracker).
catalog:
  kind: Component
  type: library
  system: shared
  owner: kai
  lifecycle: production
  description: "Go library for serving documentation via the cli-web pattern."
  dependsOn: []
  providesApis:
    - cli-web-docs-go-lib
